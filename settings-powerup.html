<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Summarize This Settings</title>
  <script src="https://p.trellocdn.com/power-up.min.js"></script>
  <style>
    :root {
      color-scheme: light;
      --blue: #0c66e4;
      --blue-dark: #0747a6;
      --green: #1f845a;
      --red: #c9372c;
      --ink: #172b4d;
      --muted: #626f86;
      --line: #dcdfe4;
      --panel: #ffffff;
      --surface: #f7f8f9;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      padding: 16px;
      background: var(--surface);
      color: var(--ink);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
      font-size: 14px;
      line-height: 1.5;
    }

    .shell {
      max-width: 560px;
      margin: 0 auto;
    }

    h1 {
      margin: 0 0 12px;
      font-size: 22px;
      line-height: 1.2;
    }

    .panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 16px;
      margin-bottom: 12px;
      box-shadow: 0 1px 1px rgba(9, 30, 66, 0.08);
    }

    .group {
      margin-bottom: 14px;
    }

    label {
      display: block;
      margin-bottom: 6px;
      color: var(--ink);
      font-weight: 700;
    }

    input,
    select {
      width: 100%;
      min-height: 38px;
      border: 1px solid #b6c2cf;
      border-radius: 6px;
      padding: 8px 10px;
      background: white;
      color: var(--ink);
      font: inherit;
    }

    input:focus,
    select:focus {
      outline: 2px solid #85b8ff;
      border-color: var(--blue);
    }

    .help {
      margin: 5px 0 0;
      color: var(--muted);
      font-size: 12px;
    }

    .warning {
      margin: 8px 0 0;
      color: #974f0c;
      font-size: 12px;
      font-weight: 700;
    }

    .field-actions {
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 8px;
    }

    .status {
      min-height: 18px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
    }

    .status.success {
      color: var(--green);
    }

    .status.error {
      color: var(--red);
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 12px;
    }

    button {
      min-height: 36px;
      border: 1px solid transparent;
      border-radius: 6px;
      padding: 8px 12px;
      font: inherit;
      font-weight: 700;
      cursor: pointer;
    }

    .primary {
      background: var(--blue);
      color: white;
    }

    .primary:hover {
      background: var(--blue-dark);
    }

    .secondary {
      background: white;
      border-color: var(--line);
      color: var(--ink);
    }

    .message {
      display: none;
      border-radius: 8px;
      padding: 10px 12px;
      margin-bottom: 12px;
      font-weight: 700;
    }

    .message.success {
      display: block;
      background: #dcfff1;
      color: var(--green);
      border: 1px solid #7ee2b8;
    }

    .message.error {
      display: block;
      background: #ffebe6;
      color: var(--red);
      border: 1px solid #fd9891;
    }
  </style>
</head>
<body>
  <div class="shell">
    <h1>Summarize This Settings</h1>
    <div id="message" class="message"></div>

    <section class="panel">
      <div class="group">
        <label for="analysisMode">Analysis mode</label>
        <select id="analysisMode">
          <option value="auto">Auto: AI when available, local fallback</option>
          <option value="ai-only">AI only</option>
          <option value="local">Local summary only</option>
        </select>
      </div>

      <div class="group">
        <label for="provider">Preferred provider</label>
        <select id="provider">
          <option value="openai">OpenAI</option>
          <option value="google">Google AI</option>
          <option value="anthropic">Anthropic</option>
          <option value="auto">Auto-select configured provider</option>
        </select>
      </div>

      <div class="group">
        <label for="strategy">Strategy</label>
        <select id="strategy">
          <option value="cost-effective">Cost-effective</option>
          <option value="best-quality">Best quality</option>
          <option value="speed-optimized">Speed optimized</option>
        </select>
      </div>
    </section>

    <section class="panel">
      <div class="group">
        <label for="promptCommentLimit">AI comment context</label>
        <select id="promptCommentLimit">
          <option value="6">Lean: latest 6 comments</option>
          <option value="12">Balanced: latest 12 comments</option>
          <option value="20">Large cards: latest 20 comments</option>
          <option value="25">Maximum: latest 25 comments</option>
        </select>
        <p class="help">Only applies when AI mode sends card context to the selected provider.</p>
      </div>

      <div class="group">
        <label for="promptCommentCharacters">Comment length per item</label>
        <select id="promptCommentCharacters">
          <option value="400">Compact: 400 characters</option>
          <option value="700">Balanced: 700 characters</option>
          <option value="1200">Detailed: 1,200 characters</option>
          <option value="1500">Maximum: 1,500 characters</option>
        </select>
      </div>

      <div class="group">
        <label for="promptDescriptionCharacters">Description context</label>
        <select id="promptDescriptionCharacters">
          <option value="1500">Compact: 1,500 characters</option>
          <option value="2500">Balanced: 2,500 characters</option>
          <option value="4000">Detailed: 4,000 characters</option>
          <option value="5000">Maximum: 5,000 characters</option>
        </select>
        <p class="warning">Larger context can improve messy-card analysis, but sends more Trello content to the configured AI provider.</p>
      </div>
    </section>

    <section class="panel">
      <div class="group">
        <label for="openaiKey">OpenAI API key</label>
        <input id="openaiKey" type="password" autocomplete="off" placeholder="sk-...">
        <p class="help">Used directly from the Power-Up iframe when OpenAI is selected.</p>
        <div class="field-actions">
          <button id="testOpenAiButton" class="secondary" type="button">Test OpenAI key</button>
          <span id="openaiStatus" class="status" aria-live="polite"></span>
        </div>
      </div>

      <div class="group">
        <label for="openaiModel">OpenAI model</label>
        <input id="openaiModel" type="text" autocomplete="off" placeholder="gpt-4o-mini">
      </div>

      <div class="group">
        <label for="googleKey">Google AI API key</label>
        <input id="googleKey" type="password" autocomplete="off" placeholder="AIza...">
        <div class="field-actions">
          <button id="testGoogleButton" class="secondary" type="button">Test Google key</button>
          <span id="googleStatus" class="status" aria-live="polite"></span>
        </div>
      </div>

      <div class="group">
        <label for="googleModel">Google model</label>
        <input id="googleModel" type="text" autocomplete="off" placeholder="gemini-1.5-flash">
      </div>

      <div class="group">
        <label for="anthropicKey">Anthropic API key</label>
        <input id="anthropicKey" type="password" autocomplete="off" placeholder="sk-ant-...">
        <div class="field-actions">
          <button id="testAnthropicButton" class="secondary" type="button">Test Anthropic key</button>
          <span id="anthropicStatus" class="status" aria-live="polite"></span>
        </div>
      </div>

      <div class="group">
        <label for="anthropicModel">Anthropic model</label>
        <input id="anthropicModel" type="text" autocomplete="off" placeholder="claude-3-5-haiku-20241022">
      </div>
    </section>

    <div class="actions">
      <button id="saveButton" class="primary" type="button">Save settings</button>
      <button id="clearButton" class="secondary" type="button">Clear keys</button>
    </div>
  </div>

  <script>
    /* global TrelloPowerUp */

    (function () {
      "use strict";

      var inTrello = Boolean(
        window.TrelloPowerUp &&
        window.TrelloPowerUp.iframe &&
        window.self !== window.top
      );
      var t = inTrello ? window.TrelloPowerUp.iframe() : null;
      var fields = {
        analysisMode: document.getElementById("analysisMode"),
        provider: document.getElementById("provider"),
        strategy: document.getElementById("strategy"),
        promptCommentLimit: document.getElementById("promptCommentLimit"),
        promptCommentCharacters: document.getElementById("promptCommentCharacters"),
        promptDescriptionCharacters: document.getElementById("promptDescriptionCharacters"),
        openaiKey: document.getElementById("openaiKey"),
        openaiModel: document.getElementById("openaiModel"),
        googleKey: document.getElementById("googleKey"),
        googleModel: document.getElementById("googleModel"),
        anthropicKey: document.getElementById("anthropicKey"),
        anthropicModel: document.getElementById("anthropicModel"),
        openaiStatus: document.getElementById("openaiStatus"),
        googleStatus: document.getElementById("googleStatus"),
        anthropicStatus: document.getElementById("anthropicStatus")
      };

      document.getElementById("saveButton").addEventListener("click", saveSettings);
      document.getElementById("clearButton").addEventListener("click", clearKeys);
      document.getElementById("testOpenAiButton").addEventListener("click", function () {
        testProvider("openai");
      });
      document.getElementById("testGoogleButton").addEventListener("click", function () {
        testProvider("google");
      });
      document.getElementById("testAnthropicButton").addEventListener("click", function () {
        testProvider("anthropic");
      });
      document.addEventListener("DOMContentLoaded", loadSettings);

      async function loadSettings() {
        var settings = await readSettings();
        fields.analysisMode.value = settings.analysisMode || "auto";
        fields.provider.value = settings.provider || "openai";
        fields.strategy.value = settings.strategy || "cost-effective";
        fields.openaiKey.value = (settings.apiKeys && settings.apiKeys.openai) || "";
        fields.googleKey.value = (settings.apiKeys && settings.apiKeys.google) || "";
        fields.anthropicKey.value = (settings.apiKeys && settings.apiKeys.anthropic) || "";
        fields.openaiModel.value = settings.openaiModel || "";
        fields.googleModel.value = settings.googleModel || "";
        fields.anthropicModel.value = settings.anthropicModel || "";
        var promptContext = normalizePromptContext(settings.promptContext);
        fields.promptCommentLimit.value = String(promptContext.commentLimit);
        fields.promptCommentCharacters.value = String(promptContext.commentCharacters);
        fields.promptDescriptionCharacters.value = String(promptContext.descriptionCharacters);
      }

      async function readSettings() {
        var fallback = {
          analysisMode: "auto",
          provider: "openai",
          strategy: "cost-effective",
          promptContext: {
            descriptionCharacters: 2500,
            commentLimit: 12,
            commentCharacters: 700
          },
          apiKeys: {}
        };

        if (!t) {
          try {
            return Object.assign(fallback, JSON.parse(localStorage.getItem("summarizeThisSettings") || "{}"));
          } catch (error) {
            return fallback;
          }
        }

        var current = await safe(function () {
          return t.get("member", "private", "summarizeThisSettings");
        }, {});
        var legacyKeys = await safe(function () {
          return t.get("member", "private", "apiKeys");
        }, {});
        var strategy = await safe(function () {
          return t.get("member", "private", "preferredStrategy");
        }, "");

        return Object.assign({}, fallback, current || {}, {
          apiKeys: Object.assign({}, legacyKeys || {}, current && current.apiKeys ? current.apiKeys : {}),
          strategy: current && current.strategy ? current.strategy : strategy || fallback.strategy
        });
      }

      async function saveSettings() {
        var settings = {
          analysisMode: fields.analysisMode.value,
          provider: fields.provider.value,
          strategy: fields.strategy.value,
          promptContext: normalizePromptContext({
            descriptionCharacters: fields.promptDescriptionCharacters.value,
            commentLimit: fields.promptCommentLimit.value,
            commentCharacters: fields.promptCommentCharacters.value
          }),
          apiKeys: {
            openai: fields.openaiKey.value.trim(),
            google: fields.googleKey.value.trim(),
            anthropic: fields.anthropicKey.value.trim()
          },
          openaiModel: fields.openaiModel.value.trim(),
          googleModel: fields.googleModel.value.trim(),
          anthropicModel: fields.anthropicModel.value.trim(),
          updatedAt: new Date().toISOString()
        };

        Object.keys(settings.apiKeys).forEach(function (key) {
          if (!settings.apiKeys[key]) delete settings.apiKeys[key];
        });

        if (settings.analysisMode === "ai-only" && Object.keys(settings.apiKeys).length === 0) {
          showMessage("Add at least one API key or choose Auto/local mode.", "error");
          return;
        }

        if (!t) {
          localStorage.setItem("summarizeThisSettings", JSON.stringify(settings));
          showMessage("Settings saved for local preview.", "success");
          return;
        }

        await t.set("member", "private", "summarizeThisSettings", settings);
        await t.set("member", "private", "apiKeys", settings.apiKeys);
        await t.set("member", "private", "preferredStrategy", settings.strategy);
        showMessage("Settings saved.", "success");

        setTimeout(function () {
          if (t && t.closePopup) t.closePopup();
        }, 900);
      }

      async function clearKeys() {
        fields.openaiKey.value = "";
        fields.googleKey.value = "";
        fields.anthropicKey.value = "";
        setProviderStatus("openai", "", "");
        setProviderStatus("google", "", "");
        setProviderStatus("anthropic", "", "");
        await saveSettings();
      }

      function normalizePromptContext(input) {
        var source = input || {};
        return {
          descriptionCharacters: allowedNumber(source.descriptionCharacters, 2500, [1500, 2500, 4000, 5000]),
          commentLimit: allowedNumber(source.commentLimit, 12, [6, 12, 20, 25]),
          commentCharacters: allowedNumber(source.commentCharacters, 700, [400, 700, 1200, 1500])
        };
      }

      function allowedNumber(value, fallback, allowed) {
        var number = Number(value);
        return allowed.indexOf(number) === -1 ? fallback : number;
      }

      async function testProvider(provider) {
        var controls = getProviderControls(provider);
        var key = controls.key.value.trim();
        var model = controls.model.value.trim() || controls.defaultModel;

        if (!key) {
          setProviderStatus(provider, "Add a key first.", "error");
          return;
        }

        setProviderStatus(provider, "Testing...", "");

        try {
          if (provider === "openai") await testOpenAiKey(key);
          if (provider === "google") await testGoogleKey(key, model);
          if (provider === "anthropic") await testAnthropicKey(key, model);
          setProviderStatus(provider, "Key works.", "success");
        } catch (error) {
          setProviderStatus(provider, formatProviderError(error), "error");
        }
      }

      async function testOpenAiKey(key) {
        var response = await fetchWithTimeout("https://api.openai.com/v1/models", {
          method: "GET",
          headers: {
            Authorization: "Bearer " + key
          }
        }, 10000);

        await ensureProviderResponse(response, "OpenAI rejected the key.");
      }

      async function testGoogleKey(key, model) {
        var response = await fetchWithTimeout("https://generativelanguage.googleapis.com/v1beta/models/" + encodeURIComponent(model) + ":generateContent", {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            "x-goog-api-key": key
          },
          body: JSON.stringify({
            contents: [{
              role: "user",
              parts: [{ text: "Reply OK." }]
            }],
            generationConfig: {
              maxOutputTokens: 1,
              temperature: 0
            }
          })
        }, 10000);

        await ensureProviderResponse(response, "Google rejected the key or model.");
      }

      async function testAnthropicKey(key, model) {
        var response = await fetchWithTimeout("https://api.anthropic.com/v1/messages", {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            "x-api-key": key,
            "anthropic-version": "2023-06-01",
            "anthropic-dangerous-direct-browser-access": "true"
          },
          body: JSON.stringify({
            model: model,
            max_tokens: 1,
            messages: [{
              role: "user",
              content: "Reply OK."
            }]
          })
        }, 10000);

        await ensureProviderResponse(response, "Anthropic rejected the key or model.");
      }

      async function ensureProviderResponse(response, fallbackMessage) {
        if (response.ok) return;

        var detail = await readProviderError(response);
        throw new Error(detail || fallbackMessage);
      }

      async function readProviderError(response) {
        try {
          var payload = await response.json();
          if (payload && payload.error && payload.error.message) return payload.error.message;
          if (payload && payload.message) return payload.message;
        } catch (error) {
          return "";
        }

        return "";
      }

      function getProviderControls(provider) {
        if (provider === "openai") {
          return {
            key: fields.openaiKey,
            model: fields.openaiModel,
            defaultModel: "gpt-4o-mini",
            status: fields.openaiStatus
          };
        }

        if (provider === "google") {
          return {
            key: fields.googleKey,
            model: fields.googleModel,
            defaultModel: "gemini-1.5-flash",
            status: fields.googleStatus
          };
        }

        return {
          key: fields.anthropicKey,
          model: fields.anthropicModel,
          defaultModel: "claude-3-5-haiku-20241022",
          status: fields.anthropicStatus
        };
      }

      function setProviderStatus(provider, text, type) {
        var status = getProviderControls(provider).status;
        status.textContent = text;
        status.className = type ? "status " + type : "status";
      }

      function formatProviderError(error) {
        var message = error && error.message ? error.message : "Validation failed.";
        if (/Failed to fetch|NetworkError|Load failed/i.test(message)) {
          return "Network request failed. Check hosting permissions and connection.";
        }
        if (message.length > 140) return message.slice(0, 137) + "...";
        return message;
      }

      async function fetchWithTimeout(url, options, timeoutMs) {
        var controller = new AbortController();
        var timeout = setTimeout(function () {
          controller.abort();
        }, timeoutMs);

        try {
          var requestOptions = Object.assign({}, options, { signal: controller.signal });
          return await fetch(url, requestOptions);
        } catch (error) {
          if (error && error.name === "AbortError") {
            throw new Error("Validation timed out.");
          }
          throw error;
        } finally {
          clearTimeout(timeout);
        }
      }

      async function safe(fn, fallback) {
        try {
          var value = await fn();
          return value === undefined || value === null ? fallback : value;
        } catch (error) {
          return fallback;
        }
      }

      function showMessage(text, type) {
        var node = document.getElementById("message");
        node.textContent = text;
        node.className = "message " + type;
        setTimeout(function () {
          node.className = "message";
        }, 3000);
      }
    }());
  </script>
</body>
</html>
