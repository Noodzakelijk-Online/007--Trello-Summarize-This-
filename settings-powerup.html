<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Summarize This Settings</title>
  <script src="https://p.trellocdn.com/power-up.min.js"></script>
  <style>
    :root {
      color-scheme: light;
      --blue: #0c66e4;
      --blue-dark: #0747a6;
      --green: #1f845a;
      --red: #c9372c;
      --ink: #172b4d;
      --muted: #626f86;
      --line: #dcdfe4;
      --panel: #ffffff;
      --surface: #f7f8f9;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      padding: 16px;
      background: var(--surface);
      color: var(--ink);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
      font-size: 14px;
      line-height: 1.5;
    }

    .shell {
      max-width: 560px;
      margin: 0 auto;
    }

    h1 {
      margin: 0 0 12px;
      font-size: 22px;
      line-height: 1.2;
    }

    .panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 16px;
      margin-bottom: 12px;
      box-shadow: 0 1px 1px rgba(9, 30, 66, 0.08);
    }

    .group {
      margin-bottom: 14px;
    }

    label {
      display: block;
      margin-bottom: 6px;
      color: var(--ink);
      font-weight: 700;
    }

    input,
    select {
      width: 100%;
      min-height: 38px;
      border: 1px solid #b6c2cf;
      border-radius: 6px;
      padding: 8px 10px;
      background: white;
      color: var(--ink);
      font: inherit;
    }

    input:focus,
    select:focus {
      outline: 2px solid #85b8ff;
      border-color: var(--blue);
    }

    .help {
      margin: 5px 0 0;
      color: var(--muted);
      font-size: 12px;
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 12px;
    }

    button {
      min-height: 36px;
      border: 1px solid transparent;
      border-radius: 6px;
      padding: 8px 12px;
      font: inherit;
      font-weight: 700;
      cursor: pointer;
    }

    .primary {
      background: var(--blue);
      color: white;
    }

    .primary:hover {
      background: var(--blue-dark);
    }

    .secondary {
      background: white;
      border-color: var(--line);
      color: var(--ink);
    }

    .message {
      display: none;
      border-radius: 8px;
      padding: 10px 12px;
      margin-bottom: 12px;
      font-weight: 700;
    }

    .message.success {
      display: block;
      background: #dcfff1;
      color: var(--green);
      border: 1px solid #7ee2b8;
    }

    .message.error {
      display: block;
      background: #ffebe6;
      color: var(--red);
      border: 1px solid #fd9891;
    }
  </style>
</head>
<body>
  <div class="shell">
    <h1>Summarize This Settings</h1>
    <div id="message" class="message"></div>

    <section class="panel">
      <div class="group">
        <label for="analysisMode">Analysis mode</label>
        <select id="analysisMode">
          <option value="auto">Auto: AI when available, local fallback</option>
          <option value="ai-only">AI only</option>
          <option value="local">Local summary only</option>
        </select>
      </div>

      <div class="group">
        <label for="provider">Preferred provider</label>
        <select id="provider">
          <option value="openai">OpenAI</option>
          <option value="google">Google AI</option>
          <option value="anthropic">Anthropic</option>
          <option value="auto">Auto-select configured provider</option>
        </select>
      </div>

      <div class="group">
        <label for="strategy">Strategy</label>
        <select id="strategy">
          <option value="cost-effective">Cost-effective</option>
          <option value="best-quality">Best quality</option>
          <option value="speed-optimized">Speed optimized</option>
        </select>
      </div>
    </section>

    <section class="panel">
      <div class="group">
        <label for="openaiKey">OpenAI API key</label>
        <input id="openaiKey" type="password" autocomplete="off" placeholder="sk-...">
        <p class="help">Used directly from the Power-Up iframe when OpenAI is selected.</p>
      </div>

      <div class="group">
        <label for="openaiModel">OpenAI model</label>
        <input id="openaiModel" type="text" autocomplete="off" placeholder="gpt-4o-mini">
      </div>

      <div class="group">
        <label for="googleKey">Google AI API key</label>
        <input id="googleKey" type="password" autocomplete="off" placeholder="AIza...">
      </div>

      <div class="group">
        <label for="googleModel">Google model</label>
        <input id="googleModel" type="text" autocomplete="off" placeholder="gemini-1.5-flash">
      </div>

      <div class="group">
        <label for="anthropicKey">Anthropic API key</label>
        <input id="anthropicKey" type="password" autocomplete="off" placeholder="sk-ant-...">
      </div>

      <div class="group">
        <label for="anthropicModel">Anthropic model</label>
        <input id="anthropicModel" type="text" autocomplete="off" placeholder="claude-3-5-haiku-20241022">
      </div>
    </section>

    <div class="actions">
      <button id="saveButton" class="primary" type="button">Save settings</button>
      <button id="clearButton" class="secondary" type="button">Clear keys</button>
    </div>
  </div>

  <script>
    /* global TrelloPowerUp */

    (function () {
      "use strict";

      var inTrello = Boolean(
        window.TrelloPowerUp &&
        window.TrelloPowerUp.iframe &&
        window.self !== window.top
      );
      var t = inTrello ? window.TrelloPowerUp.iframe() : null;
      var fields = {
        analysisMode: document.getElementById("analysisMode"),
        provider: document.getElementById("provider"),
        strategy: document.getElementById("strategy"),
        openaiKey: document.getElementById("openaiKey"),
        openaiModel: document.getElementById("openaiModel"),
        googleKey: document.getElementById("googleKey"),
        googleModel: document.getElementById("googleModel"),
        anthropicKey: document.getElementById("anthropicKey"),
        anthropicModel: document.getElementById("anthropicModel")
      };

      document.getElementById("saveButton").addEventListener("click", saveSettings);
      document.getElementById("clearButton").addEventListener("click", clearKeys);
      document.addEventListener("DOMContentLoaded", loadSettings);

      async function loadSettings() {
        var settings = await readSettings();
        fields.analysisMode.value = settings.analysisMode || "auto";
        fields.provider.value = settings.provider || "openai";
        fields.strategy.value = settings.strategy || "cost-effective";
        fields.openaiKey.value = (settings.apiKeys && settings.apiKeys.openai) || "";
        fields.googleKey.value = (settings.apiKeys && settings.apiKeys.google) || "";
        fields.anthropicKey.value = (settings.apiKeys && settings.apiKeys.anthropic) || "";
        fields.openaiModel.value = settings.openaiModel || "";
        fields.googleModel.value = settings.googleModel || "";
        fields.anthropicModel.value = settings.anthropicModel || "";
      }

      async function readSettings() {
        var fallback = {
          analysisMode: "auto",
          provider: "openai",
          strategy: "cost-effective",
          apiKeys: {}
        };

        if (!t) {
          try {
            return Object.assign(fallback, JSON.parse(localStorage.getItem("summarizeThisSettings") || "{}"));
          } catch (error) {
            return fallback;
          }
        }

        var current = await safe(function () {
          return t.get("member", "private", "summarizeThisSettings");
        }, {});
        var legacyKeys = await safe(function () {
          return t.get("member", "private", "apiKeys");
        }, {});
        var strategy = await safe(function () {
          return t.get("member", "private", "preferredStrategy");
        }, "");

        return Object.assign({}, fallback, current || {}, {
          apiKeys: Object.assign({}, legacyKeys || {}, current && current.apiKeys ? current.apiKeys : {}),
          strategy: current && current.strategy ? current.strategy : strategy || fallback.strategy
        });
      }

      async function saveSettings() {
        var settings = {
          analysisMode: fields.analysisMode.value,
          provider: fields.provider.value,
          strategy: fields.strategy.value,
          apiKeys: {
            openai: fields.openaiKey.value.trim(),
            google: fields.googleKey.value.trim(),
            anthropic: fields.anthropicKey.value.trim()
          },
          openaiModel: fields.openaiModel.value.trim(),
          googleModel: fields.googleModel.value.trim(),
          anthropicModel: fields.anthropicModel.value.trim(),
          updatedAt: new Date().toISOString()
        };

        Object.keys(settings.apiKeys).forEach(function (key) {
          if (!settings.apiKeys[key]) delete settings.apiKeys[key];
        });

        if (settings.analysisMode === "ai-only" && Object.keys(settings.apiKeys).length === 0) {
          showMessage("Add at least one API key or choose Auto/local mode.", "error");
          return;
        }

        if (!t) {
          localStorage.setItem("summarizeThisSettings", JSON.stringify(settings));
          showMessage("Settings saved for local preview.", "success");
          return;
        }

        await t.set("member", "private", "summarizeThisSettings", settings);
        await t.set("member", "private", "apiKeys", settings.apiKeys);
        await t.set("member", "private", "preferredStrategy", settings.strategy);
        showMessage("Settings saved.", "success");

        setTimeout(function () {
          if (t && t.closePopup) t.closePopup();
        }, 900);
      }

      async function clearKeys() {
        fields.openaiKey.value = "";
        fields.googleKey.value = "";
        fields.anthropicKey.value = "";
        await saveSettings();
      }

      async function safe(fn, fallback) {
        try {
          var value = await fn();
          return value === undefined || value === null ? fallback : value;
        } catch (error) {
          return fallback;
        }
      }

      function showMessage(text, type) {
        var node = document.getElementById("message");
        node.textContent = text;
        node.className = "message " + type;
        setTimeout(function () {
          node.className = "message";
        }, 3000);
      }
    }());
  </script>
</body>
</html>
